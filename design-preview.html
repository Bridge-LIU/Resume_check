<h1>面談AI評価ツール 設計書 v1.4</h1>

<blockquote class="ok">
<p><strong>目的</strong>：これまで Notion で行っていた採用面談（情報要約 → 質問作成 → 面談 → 評価）を、<strong>ローカルで動く自社ツール</strong>へ移行する。主催者の操作負担を増やさず、AI（Claude API）を「使いたいときだけ」呼べる構成にする。</p>
<p><strong>対象読者</strong>：本ツールを使う面談主催者／実装担当（あなた自身）。<br>
<strong>前提環境</strong>：ローカルPC上のWebアプリ（例：<code>localhost:3939</code>）／データはローカル保存／AIは Claude API を従量課金で利用。</p>
</blockquote>

<hr>

<h2>0. 用語ミニ辞典</h2>
<table>
<thead><tr><th>用語</th><th>かんたん説明</th></tr></thead>
<tbody>
<tr><td><strong>セッション</strong></td><td>「1回の面談」のまとまり。Notionの1ページに相当。</td></tr>
<tr><td><strong>マスタ</strong></td><td>何度も使い回す共通設定（求める人材条件・評価条件）。元データ。</td></tr>
<tr><td><strong>凍結（スナップショット）</strong></td><td>面談作成時に、その時点のマスタを面談の中へコピー保存すること。後でマスタを直しても過去の面談は変わらない。</td></tr>
<tr><td><strong>Claude API</strong></td><td>プログラムから Claude を呼ぶ仕組み。チャットのサブスクとは<strong>別契約・従量課金</strong>。</td></tr>
<tr><td><strong>Maxのチャット</strong></td><td>本書で「貼付」モードの相手として指す Claude。<strong>既定は claude.ai のWeb版</strong>（またはデスクトップアプリ）。</td></tr>
<tr><td><strong>BARS</strong></td><td>行動基準評価。実際の発言・行動の事実に基づいて点数をつける評価方式。</td></tr>
<tr><td><strong>JSON</strong></td><td>プログラムが読み書きしやすいデータ形式。<code>{"キー":"値"}</code> の形。</td></tr>
</tbody>

<h2>1. 今回の決定事項（6つの選択）</h2>
<blockquote class="ok">
<p>✅ <strong>これがこの設計書の土台です。</strong></p>
<ol>
<li><strong>②の要約は「選べる作り」</strong> — 案件ごとに「APIで自動要約」か「Claudeで要約して貼付」を選択。</li>
<li><strong>条件マスタは役割別</strong> — NW・サーバ等、募集役割ごとに条件を持つ。①作成時に役割を選んで凍結。</li>
<li><strong>⑥議事録はコピペ方式</strong> — Teams の議事録・要約をテキストで貼り付ける（ファイル取込なし）。</li>
<li><strong>⑤質問も「選べる作り」</strong> — 「APIで生成」か「事前生成した質問を貼付」を選択。</li>
<li><strong>保存期間を設定し過去データを自動削除</strong> — 採否ごとに保存日数を設定。二段階削除＋保持フラグで安全に（§7.5）。</li>
<li><strong>⑧評価も「選べる作り」</strong> — 「APIで評価」か「チャット(Max)で評価して貼付」。<strong>全工程を貼付にすればAPI料金 ¥0</strong>。</li>
</ol>
</blockquote>

</div></div>
<blockquote class="warn">
<p>⚠️ <strong>重要な切り分け</strong></p>
<ul>
<li><strong>保存</strong>は常にローカル（履歴書・評価結果はPC内のフォルダに残る）。</li>
<li><strong>AI処理（②⑤⑧）を実行した瞬間だけ</strong>、必要なテキストが Claude API へ送信される。</li>
<li><strong>APIキーはバックエンド側の環境変数に保存し、画面に絶対に出さない</strong>。</li>
</ul>
</blockquote>

<h2>4. 画面構成（セッション型）</h2>
<div class="mermaid-wrap"><div class="mermaid">

<h2>5. 各工程の詳細仕様</h2>
<p>各工程は「<strong>目的 / 主催者の操作 / 処理 / 保存先</strong>」で記述します。</p>

<h3>① 面談ページ作成</h3>
<ul>
<li><strong>目的</strong>：1面談の入れ物（セッション）を作る。</li>
<li><strong>操作</strong>：一覧で <code>＋新規面談</code> → <strong>役割を選択</strong>（例: NW）→ 氏名を入力 → <code>作成</code>。</li>
<li><strong>処理</strong>：<code>sessions/&lt;日時&gt;_&lt;氏名&gt;_&lt;役割&gt;/</code> フォルダを生成。</li>
<li><strong>保存先</strong>：フォルダ名例 <code>20260617_1430_山田太郎_NW中途</code>。</li>
</ul>

<h3>② 面談者情報（★選べる作り）</h3>
<div class="mermaid-wrap"><div class="mermaid">
flowchart TD
    S["②を開く"] --&gt; Q{"要約モードを選択"}
    Q --&gt;|"APIで自動要約"| A1["履歴書PDFをアップ<br/>→ Haiku 4.5 が要約"]
    Q --&gt;|"Claudeで要約して貼付"| A2["チャットで要約した<br/>テキストを貼り付け"]
    A1 --&gt; R["candidate.json に保存"]
    A2 --&gt; R
</div></div>
<ul>
<li><strong>目的</strong>：候補者の経歴を「要約済みテキスト」として保持。</li>
<li><strong>操作</strong>：要約モードを選ぶ →（API時）PDFをアップして <code>要約</code> ／（貼付時）<code>📋 コピー</code> → Web版 Claude に貼付＋PDF添付 → 出力を②に戻して保存。</li>
<li><strong>処理</strong>：API時は Haiku 4.5 が要約。貼付時は送信なし。</li>
<li><strong>保存先</strong>：<code>candidate.json</code>。</li>
</ul>
<blockquote class="warn">⚠️「API自動要約」は<strong>生PDF（最もPIIが多い）を送信</strong>します。情報を外に出したくない案件は「貼付」を選んでください。</blockquote>

<h3>④ 求める人材条件（役割別・凍結）</h3>
<ul>
<li><strong>目的</strong>：評価の物差しを確定し、面談に固定する。</li>
<li><strong>操作</strong>：①で選んだ役割のマスタが自動表示 → 必要なら微修正 → <code>この条件で確定</code>。</li>
<li><strong>処理</strong>：表示中の条件を<strong>スナップショット</strong>して面談内へコピー。</li>
<li><strong>保存先</strong>：<code>conditions_snapshot.json</code>（★以後この面談はこの条件で評価）。</li>
</ul>
<blockquote class="ok">
<p>✅ <strong>2段ロジック（重要）</strong></p>
<ul>
<li>条件①（基本人物像）は<strong>常に</strong>評価対象。</li>
<li>条件②（未経験者の必須）は <code>未経験可 = true</code> のときだけ評価に加える。</li>
</ul>
</blockquote>

flowchart TD

    Q --&gt;|"APIで生成"| A1["②要約 + ④条件を入力<br/>→ Sonnet 4.6 が生成"]
    Q --&gt;|"事前生成を貼付"| A2["Claudeで作った質問を<br/>テキスト欄に貼り付け"]
    A1 --&gt; R["questions.json に保存"]
    A2 --&gt; P{"整形する?"}
    P --&gt;|"そのまま"| R
    P --&gt;|"整形(Haiku)"| A3["⭐︎・狙い・解答例を構造化"]
    A3 --&gt; R
</div></div>
<ul>
<li><strong>処理</strong>：API生成は <strong>Sonnet 4.6</strong>。STAR法・コンピテンシー・キラー質問の観点で生成。必須質問は <code>⭐︎</code>、各質問に「狙い」と「解答例」を付与。</li>
<li><strong>貼付</strong>：送信なしでそのまま保存。任意で整形(API)も可能（Haiku 4.5）。</li>
<li><strong>保存先</strong>：<code>questions.json</code>。</li>
</ul>
<blockquote class="ok">✅ 貼付モードなら ⑤ の API 料金が<strong>ゼロ</strong>。月100件でも費用を大きく抑えられます。</blockquote>

<h3>⑥ 面談・議事録（コピペ）</h3>

<li><strong>処理</strong>：原則そのまま保存（送信なし）。</li>
<li><strong>保存先</strong>：<code>minutes.json</code>。</li>

<h2>7.5 データ保存期間と自動削除（PII管理）</h2>
<blockquote class="ok">🎯 <strong>狙い</strong>：応募者の個人情報を必要な期間だけ保持し、過ぎたら自動で消す。「持ちすぎない」ことが最大の情報漏えい対策。</blockquote>

<h3>設計の要点（安全側の既定）</h3>
<ul>
<li><strong>保存日数は設定で変更可能</strong>。採用/不採用で日数を分けられる（<code>0</code>＝自動削除しない）。</li>
<li><strong>起算日は「判定確定日（closedAt）」</strong>。確定した面談だけを対象にする。</li>
<li><strong>二段階削除</strong>：まず <code>_trash/</code> へ退避 → 猶予日数を過ぎてから完全削除（不可逆）。</li>
<li><strong>保持フラグ（hold）</strong>：採用者など、消したくない面談は対象外。</li>
<li><strong>匿名サマリは残せる</strong>：PIIを除いた評価結果だけ <code>analytics/</code> に保存。</li>
<li><strong>削除ログにPIIを書かない</strong>：氏名や内容を残すと削除の意味が消える。<strong>IDのみ</strong>記録。</li>
</ul>

<h3>設定例 <code>config/settings.json</code>（retention 部分）</h3>
<pre><code>{
  "retention": {
    "enabled": true,
    "anchor": "closedAt",
    "days": { "不採用": 180, "採用": 0, "未確定": 0 },
    "softDeleteGraceDays": 14,
    "keepAnonymizedEval": true
  }
}</code></pre>

<h3>自動削除の流れ</h3>
<div class="mermaid-wrap"><div class="mermaid">
flowchart TD
    Start(["定期実行：起動時/毎日1回"]) --&gt; Scan["sessions/ を走査"]
    Scan --&gt; Hold{"hold? または 未確定?"}
    Hold --&gt;|"対象外"| Skip["スキップ"]
    Hold --&gt;|"対象"| Age{"経過日数 ≥ 保存日数?"}
    Age --&gt;|"未満"| Skip
    Age --&gt;|"超過"| Anon{"匿名評価を残す?"}
    Anon --&gt;|"はい"| Keep["analytics/ に匿名サマリ保存"]
    Anon --&gt;|"いいえ"| Soft["_trash/ へ移動（ソフト削除）"]
    Keep --&gt; Soft
    Soft --&gt; Log1["deletion.log に記録（IDのみ）"]
    Log1 --&gt; Grace{"_trash 内で猶予超過?"}
    Grace --&gt;|"超過"| Hard["完全削除（復元不可）"]
    Grace --&gt;|"猶予中"| End2(["次回へ"])
    Hard --&gt; End2
</div></div>

<blockquote class="warn">
<p>⚠️ <strong>削除前プレビュー推奨</strong>：実削除の前に「次回消える面談一覧」を画面表示し、必要なら hold を立てられるようにする。</p>
<p>⚠️ <strong>バックアップとの整合</strong>：バックアップ世代にも同じ保存期間を適用しないと無意味。</p>
<p>⚠️ <strong>法令</strong>：個人情報保護法の「利用目的の達成後は遅滞なく消去」原則に整合させること。</p>
</blockquote>

<p>⚠️ <strong>PII の持ちすぎ</strong>：消さずに溜めると漏えい時の被害が拡大。→ 保存期間を設定し自動削除。</p>
